# Canonical host: 301 non-www -> www, preserving path + query.
# TLS terminates upstream (Cloudflare / proxy), so match on the forwarded Host header.
server {
    listen 80;
    server_name pixformance.com;
    return 301 https://www.pixformance.com$request_uri;
}

server {
    listen 80 default_server;
    server_name www.pixformance.com;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # =============================================
    # 301 Redirects: Old WordPress URLs → New Astro
    # =============================================

    # --- German pages (changed slugs) ---
    rewrite ^/digitales-trainingskonzept/?$ /konzept permanent;
    rewrite ^/kontakt-unverbindlich-testen/?$ /testen permanent;
    rewrite ^/kontakt-2/?$ /kontakt permanent;
    rewrite ^/unverbindlich-testen-hf/?$ /testen permanent;
    rewrite ^/training-mit-pixformance/?$ /konzept permanent;
    rewrite ^/jobs/?$ /karriere permanent;
    # rewrite ^/presse/?$ /ueber-uns permanent;  # /presse is now a live page
    rewrite ^/blog/?$ /ueber-uns permanent;

    # --- German blog posts → closest content page ---
    rewrite ^/seo-digitalisierung-drei-moeglichkeiten-wie-fitnessstudios-profitieren-koennen/?$ /fitness permanent;
    rewrite ^/fit-im-alltag-mit-5-funktionellen-uebungen/?$ /konzept permanent;
    rewrite ^/funktionelles-training-im-job-wie-man-das-nachsommertief-besiegt-seo-2/?$ /bgm permanent;
    rewrite ^/funktionelles-training-im-fitness-rehabilitationsbereich/?$ /physiotherapie permanent;
    # rewrite ^/rehabilitation-innovation-digitale-bewegungsanalyse/?$ /klinik permanent;  # page restored
    # rewrite ^/rehaklinik-patienten-digital-aktivieren-bewegungsaktivierung/?$ /klinik permanent;  # page restored
    rewrite ^/selbstzahlerbereich-physiotherapie-unterstuetzung-entlastung/?$ /physiotherapie permanent;
    rewrite ^/patienten-selbstzahlerbereich-physiotherapie-marketing/?$ /physiotherapie permanent;
    rewrite ^/chancen-selbstzahlerbereich-physiotherapie-umsatz-steigern/?$ /physiotherapie permanent;
    rewrite ^/digitalisierung-in-der-physiotherapie-corona-risikopatienten-richtig-schuetzen/?$ /physiotherapie permanent;
    rewrite ^/coronakrise-digitalisierung-physiotherapie/?$ /physiotherapie permanent;
    rewrite ^/digitalisierung-chance-fuer-die-gesundheitsbranche/?$ /physiotherapie permanent;
    rewrite ^/herausforderungen-in-der-physiotherapie/?$ /physiotherapie permanent;
    rewrite ^/regelmaessiger-sport-bei-krebs-als-sinnvolle-unterstuetzung-bei-der-therapie/?$ /klinik permanent;
    rewrite ^/lebensqualitaet-bei-multipler-sklerose-verbessern-mit-pixformance/?$ /klinik permanent;
    rewrite ^/mitgliederbindung-5-tipps-fuer-staerkere-kundenbindung-in-ihrem-fitnessstudio/?$ /fitness permanent;
    rewrite ^/selbstoptimierung-wie-fitnessstudios-von-diesem-trend-profitieren/?$ /fitness permanent;
    # rewrite ^/bewegung-bei-krebs-kranken-kindern/?$ /klinik permanent;  # page restored
    rewrite ^/rueckenschmerzen-arbeitgeber-profitieren-von-mehr-bewegung/?$ /bgm permanent;
    rewrite ^/geschaeftsstrategie-fuer-fitnessstudios-von-der-weight-watchers-rettung-lernen/?$ /fitness permanent;
    rewrite ^/digitalisierung-fuer-fitnessstudios-und-gesundheitseinrichtungen/?$ /fitness permanent;
    rewrite ^/boutique-gyms-aus-den-usa-vorbild-fuer-den-deutschen-markt/?$ /fitness permanent;

    # --- English blog posts → closest content page ---
    rewrite ^/en/top-five-challenges-faced-by-physiotherapists/?$ /en/physical-therapy/ permanent;
    rewrite ^/en/increase-physical-therapy-sales-what-opportunities-does-the-self-pay-sector-have-to-offer-now/?$ /en/physical-therapy/ permanent;
    rewrite ^/en/digitization-an-opportunity-for-the-healthcare-industry/?$ /en/physical-therapy/ permanent;
    rewrite ^/en/why-the-quantified-self-is-a-business-opportunity/?$ /en/fitness/ permanent;
    rewrite ^/en/three-strategies-on-integrating-new-technologies-into-your-functional-fitness-club/?$ /en/fitness/ permanent;
    rewrite ^/en/smart-training-with-pixformance-improves-life-quality-of-people-with-multiple-sclerosis/?$ /en/ permanent;
    rewrite ^/en/three-lessons-fitness-clubs-can-learn-from-weight-watchers/?$ /en/fitness/ permanent;

    # =============================================

    # Handle static Astro pages (directory-based with index.html)
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
